---
namespace: crane-autoscaler-system
namePrefix: crane-autoscaler-
resources:
  - ../crd
  - ../rbac
  - ../manager
  # Uncomment to enable webhooks
  # - ../webhook
  # Expose the controller manager metrics service.
  - metrics_service.yaml
patches:
  # Enable the metrics endpoint using HTTPS on port :8443.
  - path: manager_metrics_patch.yaml
    target:
      kind: Deployment
# Uncomment to enable webhooks
# - path: manager_webhook_patch.yaml
